<svg xmlns="http://www.w3.org/2000/svg" width="23" height="24" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="6" fill="#37474F"/>

  <!-- Open Notebook -->
  <!-- Left page -->
  <rect x="2" y="14" width="20" height="32" rx="2" fill="white"/>
  <!-- Right page -->
  <rect x="24" y="14" width="22" height="32" rx="2" fill="#FAFAFA"/>
  <!-- Spine -->
  <rect x="21" y="13" width="3" height="34" fill="#9E9E9E"/>
  <!-- Lines left page -->
  <line x1="5"  y1="22" x2="19" y2="22" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="5"  y1="28" x2="19" y2="28" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="5"  y1="34" x2="19" y2="34" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="5"  y1="40" x2="19" y2="40" stroke="#E0E0E0" stroke-width="1.2"/>
  <!-- Lines right page -->
  <line x1="27" y1="22" x2="43" y2="22" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="27" y1="28" x2="43" y2="28" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="27" y1="34" x2="43" y2="34" stroke="#E0E0E0" stroke-width="1.2"/>
  <line x1="27" y1="40" x2="43" y2="40" stroke="#E0E0E0" stroke-width="1.2"/>

  <!-- Pencil writing on right page (diagonal, tip touching page) -->
  <g transform="translate(44,4) rotate(38)">
    <!-- Eraser -->
    <rect x="-3" y="0" width="6" height="4" rx="1" fill="#EF9A9A"/>
    <!-- Metal band -->
    <rect x="-3" y="4" width="6" height="2.5" fill="#BDBDBD"/>
    <!-- Body -->
    <rect x="-3" y="6.5" width="6" height="18" fill="#FDD835"/>
    <!-- Wood cone -->
    <polygon points="-3,24.5 3,24.5 0,30" fill="#FFCC80"/>
    <!-- Lead tip -->
    <line x1="0" y1="26" x2="0" y2="30"
          stroke="#424242" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
